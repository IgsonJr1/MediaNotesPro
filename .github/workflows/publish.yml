name: Publish Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get metadata
        id: meta
        run: |
          # Aqui corrigimos o caminho para a sua pasta MediaNotesPro
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' MediaNotesPro/MediaNotesPro.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "zip_name=medianotespro_${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build MediaNotesPro/MediaNotesPro.csproj -c Release

      - name: Create Release Zip
        run: |
          mkdir ./publish
          cp MediaNotesPro/bin/Release/net9.0/MediaNotesPro.dll ./publish/
          cd publish
          zip -r ../${{ steps.meta.outputs.zip_name }} ./*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.meta.outputs.zip_name }}
          tag_name: v${{ steps.meta.outputs.version }}
          name: Release v${{ steps.meta.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
